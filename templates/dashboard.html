<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Weather Station Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#020617;
    color:white;
    padding:30px;
}

.header{
    text-align:center;
    margin-bottom:40px;
}

.header h1{
    font-size:55px;
    margin-bottom:10px;
}

.header h2{
    font-size:22px;
    font-weight:normal;
    color:#cbd5e1;
    margin-bottom:15px;
}

.header p{
    color:#94a3b8;
    font-size:18px;
}

.system-status{
    margin-top:20px;
}

.status{
    display:inline-block;
    margin:5px;
    padding:10px 18px;
    background:#1e293b;
    border-radius:30px;
    color:#e2e8f0;
}

.cards{
    display:grid;
    grid-template-columns:
        repeat(auto-fit,minmax(250px,1fr));

    gap:20px;
}

.card{
    background:#1e293b;
    border-radius:25px;
    padding:30px;
    box-shadow:
        0px 10px 25px
        rgba(0,0,0,0.35);

    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h2{
    color:#cbd5e1;
    font-size:24px;
}

.value{
    font-size:55px;
    font-weight:bold;
    margin-top:25px;
}

.progress{

    width:100%;
    height:12px;

    background:#334155;

    border-radius:20px;

    margin-top:25px;

    overflow:hidden;
}

.progress-fill{

    width:0%;

    height:100%;

    background:
        linear-gradient(
            to right,
            #06b6d4,
            #38bdf8
        );

    transition:0.5s;
}

/* Prediction */

.prediction-box{

    margin-top:35px;

    background:
        linear-gradient(
            135deg,
            #2563eb,
            #0ea5e9
        );

    border-radius:30px;

    padding:45px;

    text-align:center;

    box-shadow:
        0px 20px 40px
        rgba(0,0,0,0.45);
}

.prediction-title{
    font-size:22px;
    letter-spacing:3px;
}

.prediction-icon{
    font-size:100px;
    margin-top:20px;
}

.prediction-value{
    font-size:60px;
    font-weight:bold;
    margin-top:20px;
}

/* Chart */

.chart-box{

    background:#1e293b;

    margin-top:35px;

    padding:30px;

    border-radius:25px;

    box-shadow:
        0px 10px 25px
        rgba(0,0,0,0.35);
}

.chart-title{
    font-size:26px;
    margin-bottom:20px;
}

</style>

</head>

<body>

<div class="header">

    <h1>
        🌦 Smart Weather Station
    </h1>

    <h2>
        📍 Bandung, Jawa Barat, Indonesia
    </h2>

    <p id="updateTime">
        Waiting data...
    </p>

    <div class="system-status">

        <span class="status">
            🟢 ESP32 Connected
        </span>

        <span class="status">
            🔵 Flask API Running
        </span>

        <span class="status">
            🟢 SQLite Database Online
        </span>

    </div>

</div>


<div class="cards">

    <div class="card">

        <h2>
            🌡 Temperature
        </h2>

        <div
            class="value"
            id="temperature">
            --
        </div>

    </div>


    <div class="card">

        <h2>
            💧 Humidity
        </h2>

        <div
            class="value"
            id="humidity">
            --
        </div>

        <div class="progress">

            <div
                id="humidityBar"
                class="progress-fill">

            </div>

        </div>

    </div>


    <div class="card">

        <h2>
            🌪 Pressure
        </h2>

        <div
            class="value"
            id="pressure">
            --
        </div>

    </div>


    <div class="card">

        <h2>
            🏔 Altitude
        </h2>

        <div
            class="value"
            id="altitude">
            --
        </div>

    </div>


    <div class="card">

        <h2>
            ☀ Light
        </h2>

        <div
            class="value"
            id="light">
            --
        </div>

    </div>

</div>


<div class="prediction-box">

    <div class="prediction-title">
        WEATHER FORECAST
    </div>

    <div
        id="predictionIcon"
        class="prediction-icon">

        🌥

    </div>

    <div
        id="prediction"
        class="prediction-value">

        Waiting...

    </div>

</div>


<div class="chart-box">

    <div class="chart-title">
        📈 Temperature Trend
    </div>

    <canvas id="tempChart"></canvas>

</div>


<script>

let labels = [];
let tempData = [];

const ctx =
document.getElementById(
    'tempChart'
);

const chart =
new Chart(ctx, {

    type:'line',

    data:{
        labels:labels,

        datasets:[{
            label:'Temperature (°C)',
            data:tempData,
            borderColor:'#38bdf8',
            backgroundColor:'#38bdf8',
            tension:0.4,
            fill:false
        }]
    },

    options:{

        responsive:true,

        plugins:{
            legend:{
                labels:{
                    color:'white'
                }
            }
        },

        scales:{

            x:{
                ticks:{
                    color:'white'
                },
                grid:{
                    color:'#334155'
                }
            },

            y:{
                ticks:{
                    color:'white'
                },
                grid:{
                    color:'#334155'
                }
            }
        }
    }
});


async function loadData(){

    try{

        const response =
            await fetch('/api/predict');

        const data =
            await response.json();

        if(!data.temperature)
            return;


        document.getElementById(
            'temperature'
        ).innerHTML =
            data.temperature.toFixed(2)
            + " °C";


        document.getElementById(
            'humidity'
        ).innerHTML =
            data.humidity.toFixed(2)
            + " %";


        document.getElementById(
            'pressure'
        ).innerHTML =
            data.pressure.toFixed(2)
            + " hPa";


        document.getElementById(
            'altitude'
        ).innerHTML =
            data.altitude.toFixed(2)
            + " m";


        document.getElementById(
            'light'
        ).innerHTML =
            data.light_lux.toFixed(2)
            + " lux";


        document.getElementById(
            'humidityBar'
        ).style.width =
            data.humidity + "%";


        const pred =
            document.getElementById(
                'prediction'
            );

        const icon =
            document.getElementById(
                'predictionIcon'
            );

        pred.innerHTML =
            data.prediction;


        if(data.prediction === "Sunny"){

            icon.innerHTML =
                "☀️";

            pred.style.color =
                "#fde047";
        }

        else if(
            data.prediction === "Cloudy"
        ){

            icon.innerHTML =
                "☁️";

            pred.style.color =
                "#ffffff";
        }

        else if(
            data.prediction ===
            "Potential Rain"
        ){

            icon.innerHTML =
                "🌦️";

            pred.style.color =
                "#e0f2fe";
        }

        else{

            icon.innerHTML =
                "🌧️";

            pred.style.color =
                "#dbeafe";
        }


        document.getElementById(
            'updateTime'
        ).innerHTML =
            "Last Update : "
            + new Date()
            .toLocaleString();


        const now =
            new Date()
            .toLocaleTimeString();

        labels.push(now);

        tempData.push(
            data.temperature
        );

        if(labels.length > 20){

            labels.shift();
            tempData.shift();
        }

        chart.update();
    }

    catch(error){

        console.log(error);

        document.getElementById(
            'updateTime'
        ).innerHTML =
            "Connection Error";
    }
}

loadData();

setInterval(
    loadData,
    10000
);

</script>

</body>
</html>
